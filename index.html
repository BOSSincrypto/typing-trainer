<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<meta name="description" content="TypeSprint — mobile-first RU/EN typing trainer with offline mode and installable PWA support.">
<link rel="canonical" href="https://bossincrypto.github.io/typing-trainer/">
<meta property="og:type" content="website">
<meta property="og:url" content="https://bossincrypto.github.io/typing-trainer/">
<meta property="og:title" content="TypeSprint · Typing Trainer PWA">
<meta property="og:description" content="Train typing speed on mobile with RU/EN modes, offline support, and installable PWA experience.">
<meta property="og:image" content="https://bossincrypto.github.io/typing-trainer/assets/media/showcase-desktop.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="TypeSprint · Typing Trainer PWA">
<meta name="twitter:description" content="Mobile-first typing trainer with offline mode and Android PWA install.">
<meta name="twitter:image" content="https://bossincrypto.github.io/typing-trainer/assets/media/showcase-desktop.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="TypeSprint">
<title>TypeSprint · Typing Trainer</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
<header>
  <div class="seg" id="langSeg" role="tablist" aria-label="Язык">
    <button class="on" data-lang="ru" role="tab">РУС</button>
    <button data-lang="en" role="tab">ENG</button>
  </div>
  <div class="seg" id="timeSeg" role="tablist" aria-label="Время">
    <button data-time="30" role="tab">30с</button>
    <button class="on" data-time="60" role="tab">60с</button>
  </div>
</header>

<main id="screenRun">
  <div id="hud">
    <div><b id="hudTime">60</b><span>сек</span></div>
    <div><b id="hudWpm">0</b><span>зн/мин</span></div>
    <div><b id="hudAcc">100</b><span>% точн</span></div>
  </div>
  <div id="textBox" aria-live="off"></div>
  <input id="hidden" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" enterkeyhint="go" aria-label="Ввод текста">
  <p id="hint">Коснитесь текста, чтобы начать</p>
</main>

<section id="screenDone" hidden>
  <h2 id="doneWpm"></h2>
  <p id="doneDetail"></p>
  <button id="againBtn">Ещё раз</button>
  <div id="history"></div>
</section>
<script src="app.js"></script>
</body>
</html>
