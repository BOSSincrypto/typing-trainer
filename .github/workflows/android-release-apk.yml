name: android-release-apk

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload APK to (example: v1.2.0)"
        required: true
        default: "v1.2.0"

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target release tag
        id: target
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "apk_name=TypeSprint-${TAG}-android.apk" >> "$GITHUB_OUTPUT"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.8

      - name: Build debug APK
        working-directory: android
        run: gradle :app:assembleDebug --no-daemon

      - name: Prepare release asset
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "${{ steps.target.outputs.apk_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ steps.target.outputs.apk_name }}"
          path: "${{ steps.target.outputs.apk_name }}"

      - name: Upload APK to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.target.outputs.tag }}" "${{ steps.target.outputs.apk_name }}" --repo "${{ github.repository }}" --clobber
