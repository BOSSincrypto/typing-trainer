name: auto-merge-release-pr

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: ${{ startsWith(github.event.pull_request.head.ref, 'release-please--branches--') && (github.event.pull_request.user.login == 'github-actions[bot]' || github.event.pull_request.user.login == 'release-please[bot]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Enable PR auto-merge
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
